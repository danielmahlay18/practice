<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form Results</title>
</head>
<body>
    <h1>Form Results</h1>
    
    <p>Name: <span id="nameDisplay"></span></p>
    <p>Email: <span id="emailDisplay"></span></p>
    <p>Age: <span id="ageDisplay"></span></p>
    <p>Gender: <span id="genderDisplay"></span></p>
    <p>Phone: <span id="phoneDisplay"></span></p>
    <p>Level: <span id="levelDisplay"></span></p>
    <p id="passwordRow">Password: <span id="passwordDisplay"></span></p>
    
    <a href="form.html">Back to Form</a>
    
    <script>
        const urlParams = new URLSearchParams(window.location.search);
        document.getElementById('nameDisplay').textContent = urlParams.get('name') || 'Not provided';
        document.getElementById('emailDisplay').textContent = urlParams.get('email') || 'Not provided';
        document.getElementById('ageDisplay').textContent = urlParams.get('age') || 'Not provided';
        document.getElementById('genderDisplay').textContent = urlParams.get('gender') || 'Not provided';
        document.getElementById('phoneDisplay').textContent = urlParams.get('phone') || 'Not provided';
        document.getElementById('levelDisplay').textContent = urlParams.get('level') || 'Not provided';
        const password = urlParams.get('password');
        if (password) {
            document.getElementById('passwordDisplay').textContent = '••••••••';
        } else {
            document.getElementById('passwordRow').style.display = 'none';
        }
    </script>
</body>
</html
